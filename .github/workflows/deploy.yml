# Simple workflow for deploying static content to GitHub Pages
name: Deploy React App to GitHub Pages

on:
  push:
    branches:
      - main # Стартира при пускане в главния клон

permissions:
  contents: write # Дава права на автоматизацията да създаде gh-pages клона

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Сваляне на кода
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Настройка на Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Инсталиране на зависимостите
      - name: Install dependencies
        run: npm ci

      # 4. Компилиране на Vite проекта (Създава папка dist)
      - name: Build application
        run: npm run build

      # 5. Качване специално в GitHub Pages клона
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Папката, която Vite създава
          branch: gh-pages # Клонът, от който GitHub Pages ще чете
